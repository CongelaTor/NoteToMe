<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Express</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        #status { color: #aaa; height: 25px; text-align: center; margin-bottom: 10px; font-size: 14px; }
        textarea { flex-grow: 1; background: #1e1e1e; color: white; border: 1px solid #333; border-radius: 8px; padding: 15px; font-size: 18px; margin-bottom: 20px; resize: none; width: 100%; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; border-radius: 12px; padding: 20px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-record { background: #d32f2f; grid-column: span 2; margin-bottom: 10px; }
        .btn-record.recording { background: #388e3c; animation: pulse 1.5s infinite; }
        .btn-clear { background: #424242; }
        .btn-send { background: #1976d2; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="status">Prêt</div>
    <textarea id="output" placeholder="Parlez pour dicter..."></textarea>
    
    <button id="recordBtn" class="btn-record" onclick="toggleRecord()">🎤 DICTER</button>
    <div class="btn-group">
        <button class="btn-clear" onclick="clearText()">EFFACER</button>
        <button id="sendBtn" class="btn-send" onclick="sendToGmail()">ENVOYER</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const SCRIPT_URL = "TON_URL_APPS_SCRIPT_ICI/exec"; // <--- METS TON URL ICI

        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'fr-FR';
            recognition.onresult = (e) => {
                let transcript = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) output.value += e.results[i][0].transcript + ' ';
                }
            };
            recognition.onend = () => {
                recordBtn.classList.remove('recording');
                recordBtn.innerText = "🎤 DICTER";
            };
        }

        function toggleRecord() {
            if (recordBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recordBtn.classList.add('recording');
                recordBtn.innerText = "🛑 ARRÊTER";
                recognition.start();
            }
        }

        function clearText() { output.value = ""; status.innerText = "Effacé"; }

        function sendToGmail() {
            const text = output.value;
            if (!text) return alert("Message vide");
            status.innerText = "Envoi...";
            
            // Utilisation d'un formulaire pour éviter les soucis de CORS avec Apps Script
            const formData = new FormData();
            formData.append("content", text);

            fetch(SCRIPT_URL, { method: "POST", body: formData, mode: "no-cors" })
            .then(() => {
                status.innerText = "Note envoyée !";
                output.value = "";
            })
            .catch(err => status.innerText = "Erreur d'envoi");
        }
    </script>
</body>
</html>
