<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Express</title>
    <style>
        /* Correction : Ajout du padding-bottom pour la barre Samsung */
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            padding: 15px; 
            padding-bottom: env(safe-area-inset-bottom, 30px); /* Zone de sécurité */
            box-sizing: border-box; 
        }
        #status { color: #aaa; height: 25px; text-align: center; margin-bottom: 10px; font-size: 14px; }
        textarea { flex-grow: 1; background: #1e1e1e; color: white; border: 1px solid #333; border-radius: 8px; padding: 15px; font-size: 18px; margin-bottom: 20px; resize: none; width: 100%; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; border-radius: 12px; padding: 20px; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .btn-record { background: #d32f2f; grid-column: span 2; margin-bottom: 10px; }
        .btn-record.recording { background: #388e3c; animation: pulse 1.5s infinite; }
        .btn-clear { background: #424242; }
        .btn-send { background: #1976d2; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="status">Prêt</div>
    <textarea id="output" placeholder="Parlez pour dicter..."></textarea>
    
    <button id="recordBtn" class="btn-record" onclick="toggleRecord()">🎤 DICTER v01 </button>
    <div class="btn-group">
        <button class="btn-clear" onclick="clearText()">EFFACER</button>
        <button id="sendBtn" class="btn-send" onclick="sendToGmail()">ENVOYER</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        // Ton URL de script (ne change pas)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhP7RmlHrwSTllteJOaXrhqvp5WTSR-E0fqpz3LnDjtN-w3gYJTiN2ymtXVvcSj6Z1RA/exec";

        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'fr-FR';

            recognition.onresult = function(event) {
                let finalText = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalText += event.results[i][0].transcript;
                    }
                }
                // On ajoute le texte définitif au textarea
                if (finalText) {
                    output.value += finalText + " ";
                }
            };

            recognition.onend = () => {
                recordBtn.classList.remove('recording');
                recordBtn.innerText = "🎤 DICTER";
            };

            recognition.onerror = (event) => {
                status.innerText = "Erreur micro : " + event.error;
                recordBtn.classList.remove('recording');
            };
        }

        function toggleRecord() {
            if (recordBtn.classList.contains('recording')) {
                recognition.stop();
                status.innerText = "Micro arrêté";
            } else {
                recordBtn.classList.add('recording');
                recordBtn.innerText = "🛑 ARRÊTER";
                status.innerText = "Écoute en cours...";
                recognition.start();
            }
        }

        function clearText() { 
            output.value = ""; 
            status.innerText = "Effacé"; 
        }

        function sendToGmail() {
            const text = output.value.trim();
            if (!text) {
                status.innerText = "Message vide !";
                return;
            }
            status.innerText = "Envoi...";
            
            // On repasse sur FormData qui est plus simple pour Apps Script
            const formData = new FormData();
            formData.append("content", text);

            fetch(SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: formData 
            })
            .then(() => {
                status.innerText = "Note envoyée !";
                output.value = "";
            })
            .catch(err => {
                status.innerText = "Erreur d'envoi";
                console.error(err);
            });
        }
    </script>
</body>
</html>
